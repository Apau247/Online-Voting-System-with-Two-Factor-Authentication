<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - SecureVote</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="container">
    <h2>Create your voter account</h2>
    <form id="registerForm">
      <input type="hidden" name="csrf_token" value="" />
      <div>
        <label for="national_id">National ID:</label>
        <input type="text" id="national_id" name="national_id" required />
      </div>
      <div>
        <label for="full_name">Full name:</label>
        <input type="text" id="full_name" name="full_name" required />
      </div>
      <div>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required />
      </div>
      <div>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required minlength="8" />
      </div>
      <button type="submit">Register</button>
    </form>
    <p>Already registered? <a href="login.html">Login</a></p>
  </div>

  <script>
    // Fetch CSRF token from server
    async function setCsrfToken() {
      try {
        const res = await fetch('../api/csrf.php');  // Adjust path if needed
        const data = await res.json();
        const csrfInput = document.querySelector('input[name="csrf_token"]');
        if (csrfInput) csrfInput.value = data.csrf_token;
      } catch (e) {
        console.error("Failed to load CSRF token");
      }
    }

    // Set token when page loads
    document.addEventListener('DOMContentLoaded', setCsrfToken);

    // Form submission
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const form = e.target;
      const submitBtn = form.querySelector('button[type="submit"]');
      const originalBtnText = submitBtn.textContent;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Registering...';

      try {
        const formData = new FormData(form);
        const response = await fetch('../api/register.php', {  // Adjust path if needed
          method: 'POST',
          body: formData,
          credentials: 'same-origin'
        });

        const data = await response.json().catch(() => ({}));

        if (response.ok && data.success) {
          alert('Registration successful! Redirecting...');
          window.location.href = 'login.html';
        } else {
          alert(data.error || 'Registration failed.');
        }
      } catch (err) {
        alert('Network error. Please try again.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = originalBtnText;
      }
    });
  </script>
</body>
</html>
