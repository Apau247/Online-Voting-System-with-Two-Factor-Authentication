<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2FA - SecureVote</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="container">
    <h2>Two-factor authentication</h2>
    <p>Enter the 6-digit code from your authenticator app.</p>

    <form id="twoFaForm">
      <input type="hidden" name="csrf_token" value="" />
      <div>
        <label>2FA Code:</label>
        <input type="text" name="code" inputmode="numeric" pattern="[0-9]{6}" required />
      </div>
      <button type="submit">Verify</button>
    </form>
  </div>

  <script>
    document.querySelector('input[name="csrf_token"]').value = 'csrf-placeholder';

    document.getElementById('twoFaForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      const response = await fetch('api/verify-2fa.php', { method: 'POST', body: formData });
      const data = await response.json().catch(()=>({}));
      if (data.success) {
        window.location.href = data.redirect || 'vote.html';
      } else {
        alert(data.error || 'Verification failed');
      }
    });
  </script>
</body>
</html>
