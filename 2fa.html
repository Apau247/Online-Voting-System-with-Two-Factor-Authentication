<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2FA - SecureVote</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <div class="container">
    <h2>Two-factor authentication</h2>
    <p>Enter the 6-digit code from your authenticator app.</p>

    <form id="twoFaForm">
      <input type="hidden" name="csrf_token" value="" />
      <div>
        <label for="code">2FA Code:</label>
        <input type="text" id="code" name="code" inputmode="numeric" 
               pattern="[0-9]{6}" maxlength="6" required />
      </div>
      <button type="submit">Verify</button>
    </form>
  </div>

  <script>
    async function setCsrfToken() {
      try {
        const res = await fetch('api/csrf.php');
        const data = await res.json();
        const csrfInput = document.querySelector('input[name="csrf_token"]');
        if (csrfInput) csrfInput.value = data.csrf_token;
      } catch (e) {
        console.error("Failed to load CSRF token");
      }
    }

    document.addEventListener('DOMContentLoaded', setCsrfToken);

    document.getElementById('twoFaForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const form = e.target;
      const submitBtn = form.querySelector('button[type="submit"]');
      const originalText = submitBtn.textContent;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Verifying...';

      try {
        const formData = new FormData(form);
        const response = await fetch('api/verify-2fa.php', {
          method: 'POST',
          body: formData,
          credentials: 'same-origin'
        });

        const data = await response.json().catch(() => ({}));

        if (data.success) {
          window.location.href = data.redirect || 'vote.html';
        } else {
          alert(data.error || 'Invalid code. Please try again.');
        }
      } catch (err) {
        alert('Network error. Please try again.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = originalText;
      }
    });
  </script>
</body>
</html>
